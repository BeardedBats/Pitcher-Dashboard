name: Build Mac App

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    tags:
      - 'v*'  # Auto-build on version tags like v1.0.0

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: |
          npm install
          cd frontend && npm install

      - name: Install Python dependencies
        run: pip install pyinstaller fastapi uvicorn pandas numpy requests pybaseball

      - name: Build frontend
        run: |
          npm run build:frontend
          rm -rf frontend-build
          cp -r frontend/build frontend-build

      - name: Build Python backend (PyInstaller)
        run: |
          cd backend
          pyinstaller --onefile --name backend \
            --add-data 'aggregation.py:.' \
            --add-data 'data.py:.' \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --hidden-import httptools.parser.parser \
            --hidden-import anyio._backends._asyncio \
            app.py

      - name: Package Mac .dmg
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pitcher-dashboard-mac
          path: dist/*.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
