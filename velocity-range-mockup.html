<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Swim Lanes — Glow Style Options</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #1a1d2e;
    color: #e0e2ec;
    padding: 40px;
  }
  h1 { text-align: center; color: #00d4ff; margin-bottom: 10px; font-size: 24px; }
  .subtitle { text-align: center; color: rgba(180,184,210,0.6); margin-bottom: 40px; font-size: 13px; max-width: 800px; margin-left: auto; margin-right: auto; line-height: 1.6; }
  .option-section {
    background: #2E3150;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 36px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  .option-title { font-size: 18px; font-weight: 700; color: #00d4ff; margin-bottom: 4px; }
  .option-desc { font-size: 13px; color: rgba(180,184,210,0.65); margin-bottom: 20px; line-height: 1.5; }
  .pitch-tooltip {
    display: none;
    position: fixed;
    background: #23263a;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #e0e2ec;
    pointer-events: none;
    z-index: 1000;
    min-width: 220px;
    max-width: 340px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .pt-row { line-height: 1.5; }
  .tt-flex { display: flex; gap: 10px; }
  .tt-info { flex: 1; }
  .tt-mini-sz { flex-shrink: 0; }
</style>
</head>
<body>

<h1>Velocity Swim Lanes</h1>
<p class="subtitle">
  Swim lane chart with pitch-type color glow for run-scored highlights.
  Hover any dot for the full tooltip. Six innings displayed.
</p>

<div class="pitch-tooltip" id="tooltip"></div>

<div class="option-section">
  <canvas id="canvasC" style="width:100%; height:460px; border-radius:8px;"></canvas>
</div>

<script>
const PITCH_COLORS = {
  "Four-Seamer": "#FF839B",
  "Sinker": "#ffc277",
  "Slider": "#CE66FF",
  "Curveball": "#2A98FF",
  "Changeup": "#6DE95D",
  "Cutter": "#C59C9C",
};

const RUN_COLOR = "#ff2b2b";
const LABEL_COLOR = "#FFFFF0";
const DOT_R = 4.5;
const DOT_PAD = 3;

let _seed = 42;
function sr() { _seed = (_seed * 16807) % 2147483647; return (_seed - 1) / 2147483646; }

const RAW_PITCHES = [];
const INNING_BOUNDARIES = [];
const pitchMix = [
  { name: "Four-Seamer", baseVelo: 95.6, spread: 1.8, weight: 35 },
  { name: "Sinker", baseVelo: 95.1, spread: 1.2, weight: 20 },
  { name: "Slider", baseVelo: 86.8, spread: 2.0, weight: 22 },
  { name: "Curveball", baseVelo: 79.8, spread: 1.8, weight: 10 },
  { name: "Changeup", baseVelo: 87.9, spread: 1.4, weight: 8 },
  { name: "Cutter", baseVelo: 89.4, spread: 1.5, weight: 5 },
];

(function gen() {
  const MAX_INNINGS = 6;
  let count = { b: 0, s: 0 };
  const batters = ["Mookie Betts","Shohei Ohtani","Freddie Freeman","Will Smith","Max Muncy","Chris Taylor","Gavin Lux","James Outman","Miguel Rojas"];
  let bi = 0, inning = 1, outs = 0, lastInn = 0, idx = 0;
  const runPitches = new Set([18, 34, 35, 52, 71]);
  while (inning <= MAX_INNINGS && idx < 200) {
    if (inning !== lastInn) { INNING_BOUNDARIES.push({ pitchNum: idx+1, inning }); lastInn = inning; }
    const fatigue = idx > 30 ? ((idx-30)/60)*0.8 : 0;
    let r = sr()*100, cum = 0, sel = pitchMix[0];
    for (const pm of pitchMix) { cum += pm.weight; if (r <= cum) { sel = pm; break; } }
    const velo = sel.baseVelo - fatigue + (sr()-0.5)*sel.spread*2;
    const dr = sr();
    let desc, events="", ls=null, la=null, rl="", rc="", runScored=false, des="";
    if (dr<0.15){desc="ball";rl="Ball";rc="rgba(180,184,210,0.5)";count.b++;}
    else if(dr<0.30){desc="called_strike";rl="Called Strike";rc="#ffc277";count.s++;}
    else if(dr<0.46){desc="swinging_strike";rl="Whiff";rc="#ff6b6b";count.s++;}
    else if(dr<0.60){desc="foul";rl="Foul";rc="rgba(180,184,210,0.5)";if(count.s<2)count.s++;}
    else{desc="hit_into_play";ls=78+sr()*28;la=-12+sr()*50;const ev=sr();
      if(ev<0.14){events="single";rl="Single";rc="#4ade80";}
      else if(ev<0.19){events="double";rl="Double";rc="#60a5fa";}
      else if(ev<0.22){events="home_run";rl="Home Run";rc="#ff6b6b";la=25+sr()*12;ls=100+sr()*8;}
      else if(ev<0.55){events="field_out";rl=la<10?"Groundout":la<25?"Lineout":"Flyout";rc="rgba(180,184,210,0.5)";}
      else if(ev<0.68){events="force_out";rl="Groundout (FC)";rc="rgba(180,184,210,0.5)";}
      else{events="field_out";rl="Flyout";rc="rgba(180,184,210,0.5)";la=30+sr()*18;}
    }
    if(runPitches.has(idx+1)){runScored=true;des=batters[bi%batters.length]+" scores.";
      if(desc!=="hit_into_play"){des="Wild pitch. Runner scores.";}
      else if(events!=="home_run"&&events!=="single"&&events!=="double"){events="single";rl="Single";rc="#4ade80";}
    }
    RAW_PITCHES.push({pitchNum:idx+1,pitch_name:sel.name,release_speed:Math.round(velo*10)/10,
      batter_name:batters[bi%batters.length],inning,inning_topbot:"Top",outs_when_up:outs,
      balls:count.b,strikes:Math.min(count.s,2),description:desc,events,plate_x:(sr()-0.5)*2,
      plate_z:1.5+sr()*2.5,pfx_z:sel.name==="Curveball"?-(4+sr()*3):(8+sr()*8),
      pfx_x:(sr()-0.5)*16,release_extension:5.8+sr()*1.2,launch_speed:ls,launch_angle:la,
      resultLabel:rl,resultColor:rc,runScored,des});
    let pa=false;
    if(count.s>=3&&desc!=="foul"&&desc!=="ball"){outs++;pa=true;}
    else if(count.b>=4){pa=true;}
    else if(desc==="hit_into_play"){if(events==="field_out"||events==="force_out")outs++;pa=true;}
    if(pa){count={b:0,s:0};bi++;}
    if(outs>=3){outs=0;inning++;}
    idx++;
  }
})();

const typeStats={};
for(const p of RAW_PITCHES){if(!typeStats[p.pitch_name])typeStats[p.pitch_name]={min:Infinity,max:-Infinity,sum:0,count:0};
  const s=typeStats[p.pitch_name];s.min=Math.min(s.min,p.release_speed);s.max=Math.max(s.max,p.release_speed);s.sum+=p.release_speed;s.count++;}
for(const k of Object.keys(typeStats))typeStats[k].avg=typeStats[k].sum/typeStats[k].count;
const pitchTypes=Object.keys(typeStats).sort((a,b)=>typeStats[b].avg-typeStats[a].avg);

const tooltip=document.getElementById("tooltip");
function showTooltip(e,p){
  const szW=55,szH=68;
  const dotX=10+((-p.plate_x+0.83)/1.66)*(szW-4)+2;
  const dotY=14+((3.5-p.plate_z)/2.0)*(szH-4)+2;
  const dc=PITCH_COLORS[p.pitch_name]||"#888";
  const isBall=(p.description||"").toLowerCase().includes("ball")&&!(p.description||"").toLowerCase().includes("in play");
  let lines=`<div class="pt-row" style="margin-bottom:4px"><span style="color:${dc};font-weight:600">${p.pitch_name}</span><span style="margin-left:6px">${p.release_speed.toFixed(1)} mph</span><span style="margin-left:6px;color:rgba(180,184,210,0.5);font-size:0.85em">#${p.pitchNum}</span></div>`;
  if(p.batter_name)lines+=`<div class="pt-row" style="margin-bottom:4px;font-size:0.85em">vs ${p.batter_name}</div>`;
  lines+=`<div class="pt-row" style="margin-bottom:4px;font-size:0.85em">${p.inning_topbot} ${ord(p.inning)} | ${p.outs_when_up} Outs | ${p.balls}-${p.strikes}</div>`;
  if(p.pfx_z!=null)lines+=`<div class="pt-row" style="margin-bottom:4px;font-size:0.85em">iVB ${p.pfx_z.toFixed(1)}" · iHB ${(-p.pfx_x).toFixed(1)}" · Ext ${p.release_extension.toFixed(1)}ft</div>`;
  if(p.resultLabel){lines+=`<div class="pt-row" style="color:${p.resultColor};font-weight:500;font-size:0.85em">${p.resultLabel}`;if(p.launch_speed!=null)lines+=` · ${p.launch_speed.toFixed(1)} EV`;if(p.launch_angle!=null)lines+=` · ${p.launch_angle.toFixed(0)}° LA`;lines+=`</div>`;}
  if(p.runScored)lines+=`<div class="pt-row" style="color:${RUN_COLOR};font-weight:700;font-size:0.9em;margin-top:2px">RUN SCORED</div>`;
  tooltip.innerHTML=`<div class="tt-flex"><div class="tt-info">${lines}</div><svg class="tt-mini-sz" width="65" height="90" viewBox="0 0 65 90"><rect x="10" y="14" width="${szW-2}" height="${szH-2}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>${[1,2].map(i=>`<line x1="${10+(i*(szW-2))/3}" y1="14" x2="${10+(i*(szW-2))/3}" y2="${14+szH-2}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>`).join("")}${[1,2].map(i=>`<line x1="10" y1="${14+(i*(szH-2))/3}" x2="${10+szW-2}" y2="${14+(i*(szH-2))/3}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>`).join("")}<circle cx="${dotX}" cy="${dotY}" r="5" fill="${isBall?"none":dc}" stroke="${isBall?dc:"none"}" stroke-width="${isBall?2:0}"/></svg></div>`;
  tooltip.style.display="block";
  const tx=e.clientX+16,ty=e.clientY-16;
  tooltip.style.left=(tx+280>window.innerWidth?e.clientX-290:tx)+"px";
  tooltip.style.top=(ty+220>window.innerHeight?e.clientY-220:ty)+"px";
}
function hideTooltip(){tooltip.style.display="none";}
function ord(n){const s=["th","st","nd","rd"];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

function setup(canvas,w,h){const d=window.devicePixelRatio||1;canvas.width=w*d;canvas.height=h*d;canvas.style.width=w+"px";canvas.style.height=h+"px";const c=canvas.getContext("2d");c.scale(d,d);return c;}
function hex2rgba(hex,a){
  if(!hex||hex.startsWith("rgba"))return hex;
  return`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
}
const dotsMap=new Map();
function addHover(canvas,W,H){
  canvas.addEventListener("mousemove",e=>{
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W/r.width);
    const my=(e.clientY-r.top)*(H/r.height);
    const dots=dotsMap.get(canvas)||[];
    let near=null,md=18;
    for(const d of dots){const dist=Math.sqrt((mx-d.x)**2+(my-d.y)**2);if(dist<md){md=dist;near=d;}}
    canvas.style.cursor=near?"pointer":"default";
    if(near)showTooltip(e,near.pitch);else hideTooltip();
  });
  canvas.addEventListener("mouseleave",hideTooltip);
}

function renderSwimLanes(canvasId, runStyleFn) {
  const canvas = document.getElementById(canvasId);
  const W = canvas.offsetWidth;
  const H = 460;
  const ctx = setup(canvas, W, H);

  // Extra top padding for large inning labels
  const PAD = { top: 40, bottom: 40, left: 100, right: 60 };
  const plotW = W - PAD.left - PAD.right;
  const laneH = (H - PAD.top - PAD.bottom) / pitchTypes.length;
  const laneInnerPad = 6;

  ctx.fillStyle = "#252840";
  ctx.fillRect(0, 0, W, H);

  const toX = pn => PAD.left + ((pn - 1) / (RAW_PITCHES.length - 1)) * plotW;

  // Compute lane geometry first so we know the exact colored-rect bounds
  const laneInfo = pitchTypes.map((type, ti) => {
    const s = typeStats[type];
    const laneTop = PAD.top + ti * laneH;
    const innerTop = laneTop + laneInnerPad;
    const innerH = laneH - laneInnerPad * 2;
    const toY = velo => { const range = s.max - s.min || 1; return innerTop + ((s.max - velo) / range) * innerH; };
    return { type, ti, laneTop, innerTop, innerH, toY, s };
  });

  // The "container" = first colored rect top to last colored rect bottom
  const containerTop = laneInfo[0].innerTop;
  const lastLane = laneInfo[laneInfo.length - 1];
  const containerBot = lastLane.innerTop + lastLane.innerH;

  // Vertical barriers for dot x-clamping
  const barriers = [PAD.left, PAD.left + plotW];
  for (const bd of INNING_BOUNDARIES) {
    if (bd.pitchNum > 1) barriers.push(toX(bd.pitchNum) - 2);
  }
  barriers.sort((a, b) => a - b);

  function adjustDotX(rawX) {
    let cx = rawX + DOT_R;
    for (const bx of barriers) {
      if ((cx - DOT_R) < bx + DOT_PAD && (cx + DOT_R) > bx - DOT_PAD) {
        cx = bx + DOT_PAD + DOT_R;
      }
    }
    if (cx + DOT_R + DOT_PAD > PAD.left + plotW) {
      cx = PAD.left + plotW - DOT_PAD - DOT_R;
    }
    return cx;
  }

  // Alternating inning panels — strictly containerTop to containerBot
  for (let i = 0; i < INNING_BOUNDARIES.length; i++) {
    const bd = INNING_BOUNDARIES[i];
    const sx = bd.pitchNum <= 1 ? PAD.left : toX(bd.pitchNum) - 2;
    const ex = (i+1 < INNING_BOUNDARIES.length) ? toX(INNING_BOUNDARIES[i+1].pitchNum) - 2 : PAD.left + plotW;
    if (i % 2 === 1) {
      ctx.fillStyle = "rgba(255,255,255,0.02)";
      ctx.fillRect(sx, containerTop, ex - sx, containerBot - containerTop);
    }
  }

  if (runStyleFn.pre) {
    runStyleFn.pre(ctx, RAW_PITCHES, toX, adjustDotX, laneInfo, PAD, H, plotW, containerTop, containerBot);
  }

  const dots = [];

  laneInfo.forEach(({ type, ti, laneTop, innerTop, innerH, toY, s }) => {
    const color = PITCH_COLORS[type];

    // Range band
    ctx.fillStyle = hex2rgba(color, 0.08);
    ctx.fillRect(PAD.left, innerTop, plotW, innerH);

    // Left label
    ctx.fillStyle = color;
    ctx.font = "bold 12px 'DM Sans', sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText(type, PAD.left - 10, laneTop + laneH / 2);

    // Right labels: Max / Avg / Min
    const rx = PAD.left + plotW + 8;
    ctx.font = "bold 10px 'DM Sans', sans-serif";
    ctx.textAlign = "left";
    ctx.fillStyle = color;
    ctx.fillText(s.max.toFixed(1), rx, innerTop + 6);
    ctx.globalAlpha = 0.5;
    ctx.fillText(s.avg.toFixed(1), rx, laneTop + laneH / 2);
    ctx.globalAlpha = 1;
    ctx.fillText(s.min.toFixed(1), rx, innerTop + innerH - 4);

    // Dots — left-aligned, barrier-aware, clamped inside colored rect vertically
    const typePitches = RAW_PITCHES.filter(p => p.pitch_name === type);
    for (const p of typePitches) {
      const rawX = toX(p.pitchNum);
      const cx = adjustDotX(rawX);
      // Clamp Y so circle stays fully inside the colored rect
      const rawY = toY(p.release_speed);
      const cy = Math.max(innerTop + DOT_R + DOT_PAD, Math.min(innerTop + innerH - DOT_R - DOT_PAD, rawY));

      if (p.runScored && runStyleFn.preDot) {
        runStyleFn.preDot(ctx, cx, cy, p);
      }

      ctx.fillStyle = color;
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.arc(cx, cy, DOT_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      if (p.runScored && runStyleFn.postDot) {
        runStyleFn.postDot(ctx, cx, cy, p);
      }

      dots.push({ x: cx, y: cy, pitch: p });
    }
  });

  // Inning dividers — strictly containerTop to containerBot
  for (const bd of INNING_BOUNDARIES) {
    if (bd.pitchNum <= 1) continue;
    const x = toX(bd.pitchNum) - 2;
    ctx.save();
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, containerTop);
    ctx.lineTo(x, containerBot);
    ctx.stroke();
    ctx.restore();
  }

  // X-axis: pitch numbers — 12px, #FFFFF0
  ctx.fillStyle = LABEL_COLOR;
  ctx.font = "12px 'DM Sans', sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  for (let i = 15; i <= RAW_PITCHES.length; i += 15) {
    ctx.fillText(i, toX(i), containerBot + 8);
  }

  dotsMap.set(canvas, dots);
  addHover(canvas, W, H);
}

// Pitch-Type Color Glow
renderSwimLanes("canvasC", {
  preDot(ctx, x, y, p) {
    const hex = PITCH_COLORS[p.pitch_name] || "#888888";
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    ctx.save();
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 12);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.6)`);
    grad.addColorStop(0.45, `rgba(${r},${g},${b},0.2)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
});
</script>
</body>
</html>
